name: Sync Epic Status from Stories

# Three triggers:
# 1. issues closed/reopened  → instant cascade for Done / re-opened stories
# 2. schedule every 30 min   → catches In Progress changes (no native event exists)
# 3. workflow_dispatch        → manual trigger for immediate sync
on:
  issues:
    types: [closed, reopened]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync-epic-status:
    runs-on: ubuntu-latest
    steps:
      - name: Sync all epic statuses from their stories
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_ID    = "${{ vars.PROJECT_ID }}";
            const STATUS_FIELD  = "${{ vars.STATUS_FIELD }}";
            const OPT_TODO      = "${{ vars.STATUS_OPT_TODO }}";
            const OPT_INPROG    = "${{ vars.STATUS_OPT_INPROG }}";
            const OPT_DONE      = "${{ vars.STATUS_OPT_DONE }}";

            // ── Fetch all project items with labels and sub-issues ────────────
            const result = await github.graphql(`
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 50) {
                      nodes {
                        id
                        type
                        content {
                          ... on Issue {
                            id
                            number
                            state
                            labels(first: 10) {
                              nodes { name }
                            }
                            subIssues(first: 30) {
                              nodes {
                                id
                                number
                                state
                                projectItems(first: 5) {
                                  nodes {
                                    project { id }
                                    fieldValues(first: 20) {
                                      nodes {
                                        ... on ProjectV2ItemFieldSingleSelectValue {
                                          name
                                          field {
                                            ... on ProjectV2SingleSelectField { name }
                                          }
                                        }
                                      }
                                    }
                                  }
                                }
                              }
                            }
                          }
                        }
                        fieldValues(first: 20) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                              field {
                                ... on ProjectV2SingleSelectField { name }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }`, { projectId: PROJECT_ID });

            const items = result.node.items.nodes;

            // ── Filter to epics by the "epic" label (no custom Type field required) ─
            const epics = items.filter(item =>
              item.content?.labels?.nodes?.some(l => l.name === "epic") ?? false
            );

            console.log(`Found ${epics.length} epics to evaluate.`);

            for (const epic of epics) {
              if (!epic.content) { console.log("Epic item has no content, skipping."); continue; }
              const epicNum     = epic.content.number;
              const subIssues   = epic.content.subIssues?.nodes ?? [];

              if (subIssues.length === 0) {
                console.log(`Epic #${epicNum}: no sub-issues, skipping.`);
                continue;
              }

              // Get each story's current Status from THIS project
              const statuses = subIssues.map(story => {
                const projectItem = story.projectItems.nodes.find(
                  pi => pi.project.id === PROJECT_ID
                );
                if (!projectItem) {
                  return story.state === "CLOSED" ? "Done" : "Todo";
                }
                const statusField = projectItem.fieldValues.nodes.find(
                  fv => fv?.field?.name === "Status"
                );
                return statusField?.name ?? (story.state === "CLOSED" ? "Done" : "Todo");
              });

              // Derive target epic status
              let target;
              if (statuses.every(s => s === "Done")) {
                target = { name: "Done",        id: OPT_DONE   };
              } else if (statuses.some(s => s === "In Progress" || s === "Done")) {
                target = { name: "In Progress", id: OPT_INPROG };
              } else {
                target = { name: "Todo",        id: OPT_TODO   };
              }

              // Get epic's current status
              const current = epic.fieldValues.nodes.find(
                fv => fv?.field?.name === "Status"
              )?.name ?? "Todo";

              if (current === target.name) {
                console.log(`Epic #${epicNum}: already "${target.name}" ✓`);
                continue;
              }

              // Update the epic's status
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId:    $itemId
                    fieldId:   $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) { projectV2Item { id } }
                }`, {
                  projectId: PROJECT_ID,
                  itemId:    epic.id,
                  fieldId:   STATUS_FIELD,
                  optionId:  target.id
                });

              console.log(`Epic #${epicNum}: "${current}" → "${target.name}" ✓`);
            }
